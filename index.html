<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        .auth-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #075e54 0%, #128c7e 50%, #25d366 100%);
        }

        .auth-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            margin: 20px;
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-logo svg {
            width: 80px;
            height: 80px;
            fill: #075e54;
        }

        .auth-logo h1 {
            color: #075e54;
            font-size: 28px;
            margin-top: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #667781;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #d1d7db;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #128c7e;
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #128c7e, #25d366);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(37, 211, 102, 0.4);
        }

        .auth-toggle {
            text-align: center;
            margin-top: 20px;
            color: #667781;
        }

        .auth-toggle a {
            color: #128c7e;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .auth-toggle a:hover {
            text-decoration: underline;
        }

        .error-msg {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
        }

        .app-container {
            display: none;
            height: 100vh;
        }

        .app-container.active {
            display: flex;
        }

        .sidebar {
            width: 400px;
            background: #ffffff;
            border-right: 1px solid #d1d7db;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 16px;
            background: #f0f2f5;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #128c7e, #25d366);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 18px;
        }

        .user-name {
            font-weight: 600;
            color: #111b21;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .header-actions button {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .header-actions button:hover {
            background: #d1d7db;
        }

        .header-actions svg {
            width: 24px;
            height: 24px;
            fill: #54656f;
        }

        .search-container {
            padding: 8px 12px;
            background: #f0f2f5;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: white;
            border-radius: 8px;
            padding: 8px 12px;
            gap: 12px;
        }

        .search-box svg {
            width: 20px;
            height: 20px;
            fill: #667781;
        }

        .search-box input {
            flex: 1;
            border: none;
            font-size: 14px;
            outline: none;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            gap: 15px;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid #d1d7db;
        }

        .chat-item:hover {
            background: #f5f6f6;
        }

        .chat-item.active {
            background: #f0f2f5;
        }

        .chat-item .avatar {
            width: 50px;
            height: 50px;
            font-size: 20px;
        }

        .chat-info {
            flex: 1;
            min-width: 0;
        }

        .chat-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .chat-name {
            font-weight: 600;
            color: #111b21;
        }

        .chat-time {
            font-size: 12px;
            color: #667781;
        }

        .chat-preview {
            font-size: 14px;
            color: #667781;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .online-dot {
            width: 10px;
            height: 10px;
            background: #25d366;
            border-radius: 50%;
            position: absolute;
            bottom: 2px;
            right: 2px;
            border: 2px solid white;
        }

        .avatar-container {
            position: relative;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #efe7dc;
        }

        .chat-header {
            padding: 12px 16px;
            background: #f0f2f5;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid #d1d7db;
        }

        .back-btn {
            display: none;
        }

        .chat-header-info {
            flex: 1;
        }

        .chat-header-name {
            font-weight: 600;
            color: #111b21;
        }

        .chat-header-status {
            font-size: 13px;
            color: #667781;
        }

        .typing-indicator {
            color: #25d366;
            font-style: italic;
        }

        .messages-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            max-width: 65%;
            padding: 8px 12px;
            border-radius: 8px;
            position: relative;
            word-wrap: break-word;
        }

        .message.sent {
            background: #dcf8c6;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message.received {
            background: white;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message-text {
            color: #111b21;
            font-size: 14.5px;
            line-height: 1.4;
        }

        .message-meta {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 4px;
            margin-top: 4px;
            font-size: 11px;
            color: #667781;
        }

        .message-meta svg {
            width: 16px;
            height: 16px;
            fill: #53bdeb;
        }

        .message-meta svg.delivered {
            fill: #667781;
        }

        .input-area {
            padding: 12px 16px;
            background: #f0f2f5;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .input-actions {
            display: flex;
            gap: 4px;
        }

        .input-actions button {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .input-actions button:hover {
            background: #d1d7db;
        }

        .input-actions svg {
            width: 28px;
            height: 28px;
            fill: #54656f;
        }

        .message-input-container {
            flex: 1;
            position: relative;
        }

        .message-input {
            width: 100%;
            padding: 12px 20px;
            border: none;
            border-radius: 24px;
            font-size: 15px;
            outline: none;
            background: white;
        }

        .send-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: #128c7e;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.2s;
        }

        .send-btn:hover {
            background: #25d366;
            transform: scale(1.05);
        }

        .send-btn svg {
            width: 24px;
            height: 24px;
            fill: white;
            margin-left: 2px;
        }

        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #f0f2f5;
        }

        .empty-state svg {
            width: 300px;
            height: 300px;
            fill: #d1d7db;
        }

        .empty-state p {
            color: #667781;
            margin-top: 20px;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                position: absolute;
                z-index: 10;
                height: 100%;
            }

            .sidebar.hidden {
                display: none;
            }

            .chat-area {
                width: 100%;
            }

            .back-btn {
                display: block;
            }
        }

        .logout-btn {
            padding: 8px 16px;
            background: #e74c3c;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }

        .logout-btn:hover {
            background: #c0392b;
        }

        .online-users {
            font-size: 12px;
            color: #25d366;
            margin-top: 4px;
        }
    </style>
</head>

                    <label>Password</label>
                    <input type="password" id="regPassword" placeholder="Min 6 characters">
                </div>
                <button class="auth-btn" onclick="register()">Sign Up</button>
                <div class="error-msg" id="regError"></div>
                <div class="auth-toggle">
                    Already have an account? <a onclick="showLogin()">Log in</a>

        </div>
    </div>

        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="user-profile">
                    <div class="avatar" id="userAvatar">U</div>
                    <div>
                        <span class="user-name" id="userDisplay">User</span>
                        <div class="online-users" id="onlineUsersCount">0 users online</div>

                </div>
                <div class="header-actions">

                    </button>
                </div>
            </div>
            <div class="search-container">
                <div class="search-box">
                    <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>

    <script>
        let socket;
        let currentUser = null;
        let currentChat = null;
        let contacts = [];
        let onlineUsers = new Set();

        const defaultContacts = [
            { id: 1, name: 'Alex Johnson', phone: '+12345678901', online: false, messages: [] },
            { id: 2, name: 'Sarah Miller', phone: '+12345678902', online: false, messages: [] },
            { id: 3, name: 'Mike Davis', phone: '+12345678903', online: false, messages: [] },
            { id: 4, name: 'Emily Brown', phone: '+12345678904', online: false, messages: [] },
            { id: 5, name: 'Chris Wilson', phone: '+12345678905', online: false, messages: [] },
            { id: 6, name: 'Jessica Taylor', phone: '+12345678906', online: false, messages: [] },
            { id: 7, name: 'David Anderson', phone: '+12345678907', online: false, messages: [] },
            { id: 8, name: 'Amanda Thomas', phone: '+12345678908', online: false, messages: [] }
        ];

        function initSocket() {
            socket = io();

            socket.on('connect', () => {
                console.log('Connected to server');
                if (currentUser) {
                    socket.emit('register', currentUser.phone);
                }
            });

            socket.on('userOnline', (phone) => {
                onlineUsers.add(phone);
                updateOnlineIndicators();
                updateOnlineCount();
            });

            socket.on('userOffline', (phone) => {
                onlineUsers.delete(phone);
                updateOnlineIndicators();
                updateOnlineCount();
            });

            socket.on('newMessage', (message, fromPhone) => {
                if (currentChat && currentChat.phone === fromPhone) {
                    currentChat.messages.push(message);
                    renderMessages();
                }
                
                const contact = contacts.find(c => c.phone === fromPhone);
                if (contact) {
                    contact.messages.push(message);
                    renderChatList();
                }
            });

            socket.on('messageDelivered', (data) => {
                if (currentChat) {
                    const msg = currentChat.messages.find(m => m.id === data.messageId);
                    if (msg) {
                        msg.delivered = true;
                        renderMessages();
                    }
                }
            });

            socket.on('messageUpdated', (data) => {
                if (currentChat) {
                    const msg = currentChat.messages.find(m => m.id === data.messageId);
                    if (msg) {
                        msg.delivered = true;
                        renderMessages();
                    }
                }
            });

            socket.on('typing', (data) => {
                if (currentChat && currentChat.phone === data.phone) {
                    const statusEl = document.getElementById('chatStatus');
                    if (data.typing) {
                        statusEl.innerHTML = '<span class="typing-indicator">typing...</span>';
                    } else {
                        statusEl.textContent = onlineUsers.has(data.phone) ? 'online' : 'offline';
                    }
                }
            });
        }

        function updateOnlineIndicators() {
            document.querySelectorAll('.chat-item').forEach((item, index) => {
                if (contacts[index]) {
                    const dot = item.querySelector('.online-dot');
                    if (!dot) {
                        const avatarContainer = item.querySelector('.avatar-container');
                        const dot = document.createElement('div');
                        dot.className = 'online-dot';
                        avatarContainer.appendChild(dot);
                    }
                    const contact = contacts[index];
                    const shouldShow = onlineUsers.has(contact.phone);
                    const existingDot = item.querySelector('.online-dot');
                    if (existingDot) {
                        existingDot.style.display = shouldShow ? 'block' : 'none';
                    }
                }
            });

            if (currentChat) {
                const isOnline = onlineUsers.has(currentChat.phone);
                document.getElementById('onlineIndicator').style.display = isOnline ? 'block' : 'none';
                document.getElementById('chatStatus').textContent = isOnline ? 'online' : 'offline';
            }
        }

        function updateOnlineCount() {
            document.getElementById('onlineUsersCount').textContent = `${onlineUsers.size} users online`;
        }

        function init() {
            const loggedIn = sessionStorage.getItem('wa_currentUser');
            if (loggedIn) {
                currentUser = JSON.parse(loggedIn);
                showApp();
            }
            initSocket();
        }

        function showRegister() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
            document.getElementById('loginError').textContent = '';
            document.getElementById('regError').textContent = '';
        }

        function showLogin() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('loginError').textContent = '';
            document.getElementById('regError').textContent = '';
        }

        async function register() {
            const username = document.getElementById('regUsername').value.trim();
            const phone = document.getElementById('regPhone').value.trim();
            const password = document.getElementById('regPassword').value;

            if (!username || !phone || !password) {
                document.getElementById('regError').textContent = 'Please fill in all fields';
                return;
            }

            if (password.length < 6) {
                document.getElementById('regError').textContent = 'Password must be at least 6 characters';
                return;
            }

            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, phone, password })
                });
                const data = await res.json();

                if (!data.success) {
                    document.getElementById('regError').textContent = data.error;
                    return;
                }

                currentUser = data.user;
                sessionStorage.setItem('wa_currentUser', JSON.stringify(currentUser));
                showApp();
            } catch (err) {
                document.getElementById('regError').textContent = 'Server error. Make sure server is running.';
            }
        }

        async function login() {
            const phone = document.getElementById('loginPhone').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!phone || !password) {
                document.getElementById('loginError').textContent = 'Please fill in all fields';
                return;
            }

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, password })
                });
                const data = await res.json();

                if (!data.success) {
                    document.getElementById('loginError').textContent = data.error;
                    return;
                }

                currentUser = data.user;
                sessionStorage.setItem('wa_currentUser', JSON.stringify(currentUser));
                showApp();
            } catch (err) {
                document.getElementById('loginError').textContent = 'Server error. Make sure server is running.';
            }
        }

        function logout() {
            currentUser = null;
            sessionStorage.removeItem('wa_currentUser');
            document.getElementById('authContainer').style.display = 'flex';
            document.getElementById('appContainer').classList.remove('active');
            document.getElementById('loginPhone').value = '';
            document.getElementById('loginPassword').value = '';
        }

        async function showApp() {
            document.getElementById('authContainer').style.display = 'none';
            document.getElementById('appContainer').classList.add('active');
            document.getElementById('userDisplay').textContent = currentUser.username;
            document.getElementById('userAvatar').textContent = currentUser.username.charAt(0).toUpperCase();
            
            socket.emit('register', currentUser.phone);
            
            await loadContacts();
            renderChatList();
        }

        async function loadContacts() {
            try {
                const res = await fetch(`/api/contacts/${currentUser.phone}`);
                contacts = await res.json();
            } catch (err) {
                contacts = JSON.parse(JSON.stringify(defaultContacts));
            }
        }

        function renderChatList() {
            const chatList = document.getElementById('chatList');

            contacts.sort((a, b) => {
                const aLast = a.messages && a.messages.length > 0 ? a.messages[a.messages.length - 1].time : 0;
                const bLast = b.messages && b.messages.length > 0 ? b.messages[b.messages.length - 1].time : 0;
                return bLast - aLast;
            });

            chatList.innerHTML = contacts.map((contact, index) => {
                const msgs = contact.messages || [];
                const lastMsg = msgs.length > 0 ? msgs[msgs.length - 1].text : 'No messages yet';
                const lastTime = msgs.length > 0 ? formatTime(msgs[msgs.length - 1].time) : '';
                const isOnline = onlineUsers.has(contact.phone);

                return `
                    <div class="chat-item ${currentChat && currentChat.phone === contact.phone ? 'active' : ''}" onclick="openChat(${index})">
                        <div class="avatar-container">
                            <div class="avatar">${contact.name.charAt(0)}</div>
                            ${isOnline ? '<div class="online-dot"></div>' : ''}
                        </div>
                        <div class="chat-info">
                            <div class="chat-top">
                                <span class="chat-name">${contact.name}</span>
                                <span class="chat-time">${lastTime}</span>
                            </div>
                            <div class="chat-preview">${lastMsg}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function openChat(index) {
            currentChat = contacts[index];

            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('chatView').style.display = 'flex';

            document.getElementById('chatName').textContent = currentChat.name;
            document.getElementById('chatAvatar').textContent = currentChat.name.charAt(0);
            
            const isOnline = onlineUsers.has(currentChat.phone);
            document.getElementById('chatStatus').textContent = isOnline ? 'online' : 'offline';
            document.getElementById('onlineIndicator').style.display = isOnline ? 'block' : 'none';

            renderMessages();
            renderChatList();

            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.add('hidden');
            }
        }

        function closeChat() {
            currentChat = null;
            document.getElementById('emptyState').style.display = 'flex';
            document.getElementById('chatView').style.display = 'none';
            document.getElementById('sidebar').classList.remove('hidden');
            renderChatList();
        }

        function renderMessages() {
            const container = document.getElementById('messagesContainer');
            const msgs = currentChat.messages || [];
            
            container.innerHTML = msgs.map(msg => `
                <div class="message ${msg.sent ? 'sent' : 'received'}">
                    <div class="message-text">${msg.text}</div>
                    <div class="message-meta">
                        <span>${formatTime(msg.time)}</span>
                        ${msg.sent ? `<svg class="${msg.delivered ? 'delivered' : ''}" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>` : ''}
                    </div>
                </div>
            `).join('');

            container.scrollTop = container.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();

            if (!text || !currentChat) return;

            const message = {
                id: Date.now().toString(),
                text,
                time: Date.now(),
                sent: true,
                delivered: false
            };

            currentChat.messages = currentChat.messages || [];
            currentChat.messages.push(message);
            input.value = '';
            renderMessages();
            renderChatList();

            socket.emit('sendMessage', {
                from: currentUser.phone,
                to: currentChat.phone,
                text,
                timestamp: message.time
            });
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        }

        let typingTimeout;
        document.getElementById('messageInput')?.addEventListener('input', (e) => {
            if (currentChat && e.target.value) {
                socket.emit('typing', { to: currentChat.phone, typing: true });
                clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => {
                    socket.emit('typing', { to: currentChat.phone, typing: false });
                }, 2000);
            }
        });

        function filterChats() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const items = document.querySelectorAll('.chat-item');
            
            items.forEach((item, index) => {
                if (contacts[index]) {
                    const name = contacts[index].name.toLowerCase();
                    item.style.display = name.includes(query) ? 'flex' : 'none';
                }
            });
        }

        function formatTime(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;

            if (diff < 86400000 && date.getDate() === now.getDate()) {
                return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            } else if (diff < 604800000) {
                return date.toLocaleDateString([], { weekday: 'short' });
            } else {
                return date.toLocaleDateString([], { month: 'short', day: 'numeric' });
            }
        }

        init();
    </script>
</body>
</html>
